<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Carrinho de compras</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Produtos no carrinho</h1>
  <div>
    <label>Nome:</label>
    <input type="text" id="inputNome" placeholder="Nome do produto" />

    <label>Preço (MZN):</label>
    <input type="number" id="inputPreco" placeholder="Preço" min="0" />

    <button onclick="adicionarProduto()">Adicionar</button>
  </div>

  <hr />

  
  <h2>Produtos Disponíveis</h2>
  <ul id="listaProdutos"></ul>

  <hr />

  
  <h2>Produtos Adicionados ao carrinho</h2>
  <ul id="listaProdutos"></ul>

  <p>Total de itens: <strong id="totalItens">0</strong></p>
  <p>Total a pagar: <strong id="totalPreco">0.00 MZN</strong></p>

  <button onclick="encerrarCompra()">Encerrar Compra</button>


  <script src="app.js"></script>
</body>
</html>
