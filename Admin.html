<!DOCTYPE HTML>
<html>
    <head>
        <title>Pagina de Admin</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
        <link rel="stylesheet" href="adminStyle.css"/>
            
    </head>
    <body>
        <header>
            
            <div id="logo"><i class="fa-solid fa-store"></i><b> Shop-E   </b><span class="header-badge" style="text-decoration: none;
                font-size: 0.85rem;
                font-weight: 600;
                font-family: 'Times New Roman', Times, serif;
                color: plum;
                border: 1.5px solid plum;
                padding: 5px 14px;
                border-radius: 20px;"><i class="fa-solid fa-screwdriver-wrench"></i> Admin</span></div>

 <!--Navegacao para a pagina do cliente-->               
            <a href="cliente.html" style="
                text-decoration: none;
                font-size: 0.85rem;
                font-weight: 600;
                color: plum;
                border: 1.5px solid plum;
                padding: 5px 14px;
                border-radius: 20px;" >
                <i class="fa-solid fa-bag-shopping"></i>  Ver Loja
            </a>
        </header>


        <h2>Gestão de Produtos</h2>
        <p>Bem vindo(a) à página de Administrador!</p>
        <main>
            
            <div class="colunaEsquerda">
<!-- Adicionar -->
                <div class="cardAdd">
                    <h3><i class="fa-solid fa-plus"></i> Adicionar produtos</h3>
                    <label>Nome</label><br>
                    <input type="text" id="nomeProduto" name="Nome"><br><br>

                    <label>Preço (MT)</label><br>
                    <input type="number" id="precoProduto" name="Preco"><br>

                    <button type="button" id="btnAdd">+ Adicionar</button>
                

                </div>
            

 <!-- Remover -->       
                <div class="cardRemover">
                    <h3><i class="fa-solid fa-trash"></i> Remover produto</h3>
                    <label>Nome</label><br>
                    <input type="text" id="nomeRemover" name="NomeRemover"><br> 
                    <button type="button" id="btnRem">Remover</button>
                </div>
            </div>

<!-- Lista -->
             <div class="cardLista">
                <h3><i class="fa-solid fa-list"></i> Produtos Disponíveis</h3>
                <div class="countProd">Total: <span id="totalProdutos">0</span> produto(s)</div>
                <div class="product-table" id="listaProdutos">
                    <div class="empty-state">
                    Nenhum produto registado.
                    </div>
                </div>
                </div>
            </div>

        </main>


<!--JS-->
        <script src="adminScript.js"></script>
        

            
    </body>

</html>
