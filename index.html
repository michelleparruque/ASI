<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop-E - Loja Online</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

    <header>
        <div id="logo">
            <i class="fa-solid fa-store"></i><b> Shop-E</b>
        </div>
    </header>

    <button id="Voltar">Voltar</button>

    <main>
        <div class="cardLista">
            <h3>Produtos Disponiveis</h3>
            <ul id="lista-produtos"></ul>
        </div>

        <div class="cardLista">
            <h3>Carrinho de Compras</h3>
            <ul id="lista-carrinho"></ul>
            <hr>
            <p>Quantidade: <span id="totalItens">0</span></p>
            <p>Total: <span id="totalPreco">0.00 MZN</span></p>
            <button id="btnEncerrar"> Encerrar Compra </button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
