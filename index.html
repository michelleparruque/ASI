<!DOCTYPE html>
<<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja Online</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1> Loja </h1>
  </header>

  <main>

    <section class="card" id="secao-adicionar">
      <h2>Adicionar Produto</h2>
      <div class="form-grupo">
        <label for="input-nome">Nome do Produto</label>
        <input type="text" id="input-nome" placeholder="Ex: Camiseta">
      </div>
      <div class="form-grupo">
        <label for="input-preco">Preço (MT)</label>
        <input type="number" id="input-preco" placeholder="Ex: 500">
      </div>
      <p id="erro-produto" class="erro"></p>
      <button id="botao-adicionar-produto">Adicionar Produto</button>
    </section>

    <section class="card" id="secao-produtos">
      <h2>Produtos Disponíveis</h2>
      <ul id="lista-produtos">
      </ul>
    </section>

    <section class="card" id="secao-carrinho">
      <h2>Carrinho de Compras</h2>
      <ul id="lista-carrinho">
      </ul>
      <div id="resumo-carrinho">
        <p>Quantidade de produtos: <strong id="total-itens">0</strong></p>
        <p>Total a pagar: <strong id="total-preco">0 MT</strong></p>
      </div>
      <button onclick="Controller.encerrarCompra()">Encerrar Compra</button>
      <!-- <button id="botao-encerrar" class="botao-encerrar">Encerrar Compra</button> -->
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
